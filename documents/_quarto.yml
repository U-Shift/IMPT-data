project:
  type: book
  output-dir: _book

book:
  title: "IMPT — Índice Multidimensional e Multimodal de Pobreza nos Transportes"
  subtitle: "Methodological Report"
  author: "U-Shift Lab, Instituto Superior Técnico"
  date: today
  date-format: "MMMM YYYY"
  chapters:
    - index.qmd
    - part: "**Data**"
      chapters:
        - data_sources.qmd
        - data_access.qmd
        - data_preparation.qmd
        - transport_routing.qmd
    - part: "**Dimensions and PCA**"
      chapters:
        - mobility.qmd
        - accessibility.qmd
        - affordability.qmd
        - safety.qmd
        - calculator.qmd
        - pca_results.qmd
    - part: "**Dashboard and Reproducibility**"
      chapters:
        - output_dashboard.qmd
        - metadata.qmd
        - reproducibility.qmd
    - references.qmd
    - about.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    echo: false
    code-fold: true
    lightbox: true # abrir imagens popup

google-scholar: true