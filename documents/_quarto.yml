project:
  type: book
  output-dir: _book

book:
  title: "IMPT — Índice Multidimensional e Multimodal de Pobreza nos Transportes"
  subtitle: "Methodological Report"
  author: "U-Shift Lab, Instituto Superior Técnico"
  date: today
  date-format: "MMMM YYYY"
  chapters:
    - index.qmd
    - data_sources.qmd
    - data_preparation.qmd
    - transport_routing.qmd
    - dimensions.qmd
    - calculator.qmd
    - output_dashboard.qmd
    - reproducibility.qmd
    - references.qmd
    - pca_results.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    code-fold: true
    echo: false
